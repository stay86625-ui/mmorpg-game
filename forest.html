<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>魔法世界 — Enchanted World</title>
<style>
/* ── Base ─────────────────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;}

/* ── In-game HUD ──────────────────────────────────────────────────── */
#hud{
  position:fixed;top:10px;left:14px;z-index:50;
  color:rgba(235,210,140,.92);
  font:13px/2 'Segoe UI','Microsoft JhengHei',sans-serif;
  pointer-events:none;text-shadow:0 1px 4px #000;
}
#hud small{display:block;font-size:10px;opacity:.40;line-height:1.6;}

/* ── HP / MP 條 ────────────────────────────────────────────────────── */
#stat-bars{
  position:fixed;bottom:76px;left:14px;z-index:50;
  display:none;flex-direction:column;gap:5px;pointer-events:none;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}
.bar-row{display:flex;align-items:center;gap:7px;}
.bar-lbl{color:rgba(180,160,120,.72);font-size:11px;width:22px;text-align:right;}
.bar-bg{
  width:145px;height:9px;
  background:rgba(0,0,0,.55);border:1px solid rgba(55,75,110,.45);
  border-radius:2px;overflow:hidden;
}
.bar-fill{height:100%;border-radius:2px;transition:width .15s ease;}
#hp-fill{background:linear-gradient(90deg,#8B1010,#EE2222);}
#mp-fill{background:linear-gradient(90deg,#0F2AAA,#1E55EE);}
.bar-txt{color:rgba(155,140,105,.65);font-size:10px;min-width:60px;}

/* ── 技能欄 ────────────────────────────────────────────────────────── */
#skill-bar{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  z-index:50;display:none;flex-direction:row;gap:10px;pointer-events:none;
}
.sk-slot{
  width:64px;text-align:center;
  background:rgba(0,0,0,.68);border:1px solid rgba(70,110,170,.38);
  border-radius:4px;padding:6px 4px 5px;position:relative;overflow:hidden;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  color:rgba(230,205,135,.88);transition:opacity .2s;
}
.sk-key{font-size:18px;font-weight:bold;color:#D4A017;line-height:1.1;}
.sk-name{font-size:10px;color:rgba(195,175,120,.82);margin:2px 0 1px;white-space:nowrap;overflow:hidden;}
.sk-mp{font-size:10px;color:#4477DD;}
.sk-cd-bar{height:3px;background:rgba(255,255,255,.10);border-radius:2px;margin-top:5px;overflow:hidden;}
.sk-cd-fill{
  height:100%;
  background:linear-gradient(90deg,#3355AA,#6688CC);
  width:0%;transition:width .12s linear;
}

/* ── EXP 條 ─────────────────────────────────────────────────────────── */
#exp-area{
  position:fixed;bottom:0;left:0;width:100%;height:4px;
  z-index:51;display:none;align-items:center;pointer-events:none;
}
#exp-bg{flex:1;height:4px;background:rgba(0,0,0,.35);}
#exp-fill{height:100%;background:linear-gradient(90deg,#4D11AA,#8833EE);width:0%;transition:width .35s ease;}

#lv-txt{
  position:fixed;bottom:6px;left:14px;z-index:52;
  color:rgba(195,175,120,.75);font-size:11px;
  font-family:'Segoe UI',sans-serif;pointer-events:none;display:none;
}
#exp-txt{
  position:fixed;bottom:6px;right:172px;z-index:52;
  color:rgba(130,110,90,.60);font-size:10px;
  font-family:'Segoe UI',sans-serif;pointer-events:none;
}

/* ── 升級提示 ──────────────────────────────────────────────────────── */
#lvup-notice{
  position:fixed;top:50%;left:50%;z-index:60;
  transform:translate(-50%,-50%);display:none;pointer-events:none;
  color:#FFD700;font-size:30px;font-weight:bold;letter-spacing:5px;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  text-shadow:0 0 24px #FFD700BB,0 0 50px #FFD70066;
  animation:lvupAnim 3.6s ease-out forwards;
}
@keyframes lvupAnim{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(.85);}
  12% {opacity:1;transform:translate(-50%,-50%) scale(1.08);}
  65% {opacity:1;transform:translate(-50%,-55%);}
  100%{opacity:0;transform:translate(-50%,-72%);}
}

/* ── 金幣顯示 ────────────────────────────────────────────────────── */
#hud-gold{
  position:fixed;top:10px;right:180px;z-index:50;display:none;
  color:#FFD700;font:13px/1 'Segoe UI',sans-serif;pointer-events:none;
  text-shadow:0 1px 4px #000;
}

/* ── 互動提示（NPC / 採集）──────────────────────────────────────── */
#interact-hint,#gather-hint{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:55;display:none;pointer-events:none;
  background:rgba(0,0,0,.72);border:1px solid rgba(80,120,180,.4);
  border-radius:4px;padding:6px 18px;
  color:rgba(210,195,140,.88);font-size:12px;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}

/* ── 拾取通知 ─────────────────────────────────────────────────────── */
#loot-notifs{
  position:fixed;top:55px;right:14px;z-index:55;pointer-events:none;
  display:flex;flex-direction:column;gap:4px;align-items:flex-end;
}
.loot-notif{
  background:rgba(0,0,0,.72);border:1px solid rgba(60,100,160,.3);
  border-radius:3px;padding:4px 12px;font-size:12px;
  color:rgba(200,185,130,.9);
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  animation:lootFade 2.6s ease-out forwards;
}
@keyframes lootFade{0%{opacity:0;transform:translateX(14px);}10%{opacity:1;transform:translateX(0);}80%{opacity:1;}100%{opacity:0;}}

/* ── 任務通知 ─────────────────────────────────────────────────────── */
#quest-notif{
  position:fixed;top:50px;left:50%;transform:translateX(-50%);
  z-index:56;display:none;pointer-events:none;
  background:rgba(0,0,0,.82);border:1px solid rgba(100,200,100,.35);
  border-radius:4px;padding:8px 24px;
  color:#88EE88;font-size:13px;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  text-shadow:0 0 10px #44AA4488;
}
#boss-notif{
  position:fixed;top:58px;left:50%;transform:translateX(-50%);
  z-index:57;display:none;pointer-events:none;
  background:rgba(0,0,0,.85);border:1px solid rgba(220,80,20,.5);
  border-radius:4px;padding:9px 28px;
  color:#FF8844;font-size:14px;font-weight:bold;letter-spacing:1px;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  text-shadow:0 0 14px #FF440088;
}

/* ── Boss HP 條（頂部）──────────────────────────────────────────── */
#boss-bar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  z-index:58;display:none;flex-direction:column;align-items:center;
  pointer-events:none;padding:4px 0;
}
#boss-bar-name{
  color:#FF8844;font-size:12px;letter-spacing:2px;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  text-shadow:0 0 10px #FF440066;margin-bottom:3px;
}
#boss-bar-bg{
  width:340px;height:8px;background:rgba(0,0,0,.65);
  border:1px solid rgba(220,80,20,.4);border-radius:2px;overflow:hidden;
}
#boss-bar-fill{
  height:100%;width:100%;
  background:linear-gradient(90deg,#991100,#FF2200);
  transition:width .25s ease;
}

/* ══════════════════════════════════════════════════════════════════
   SHARED UI PANEL STYLES
   ══════════════════════════════════════════════════════════════════ */
.ui-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.55);
  display:none;align-items:center;justify-content:center;
}
.ui-overlay.open{display:flex;}
.ui-panel{
  background:rgba(6,10,20,.97);
  border:1px solid rgba(80,120,180,.28);border-radius:6px;
  padding:0;min-width:360px;max-width:92vw;max-height:85vh;
  overflow:hidden;display:flex;flex-direction:column;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  box-shadow:0 8px 40px rgba(0,0,0,.8);
}
.ui-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px 10px;border-bottom:1px solid rgba(60,100,160,.2);
  flex-shrink:0;
}
.ui-panel-title{
  color:#D4A017;font-size:16px;letter-spacing:3px;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}
.ui-close{
  background:none;border:none;color:rgba(160,140,100,.5);
  font-size:18px;cursor:pointer;padding:0 4px;line-height:1;
  transition:color .15s;
}
.ui-close:hover{color:#D4A017;}
.ui-body{
  overflow-y:auto;padding:14px 18px;flex:1;
  scrollbar-width:thin;scrollbar-color:rgba(80,120,180,.3) transparent;
}

/* ── 物品格子（背包）──────────────────────────────────────────────── */
#inv-panel{min-width:640px;}
.inv-layout{display:flex;gap:16px;}
.inv-equip{display:flex;flex-direction:column;gap:5px;min-width:160px;}
.eq-slot{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.03);border:1px solid rgba(50,80,130,.3);
  border-radius:4px;padding:6px 10px;cursor:pointer;transition:border-color .15s;
}
.eq-slot:hover{border-color:#4488BB;}
.eq-lbl{color:rgba(120,140,180,.6);font-size:11px;min-width:32px;}
.eq-icon{font-size:13px;color:rgba(210,185,140,.85);flex:1;text-align:right;}
.inv-bag{flex:1;}
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.inv-slot{
  aspect-ratio:1;background:rgba(255,255,255,.04);
  border:1px solid rgba(50,80,130,.25);border-radius:3px;
  position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .12s,background .12s;overflow:hidden;
}
.inv-slot:hover{background:rgba(80,120,200,.12);border-color:rgba(80,140,220,.5);}
.inv-icon{font-size:18px;line-height:1;}
.inv-qty{
  position:absolute;bottom:1px;right:3px;
  font-size:10px;color:rgba(200,185,140,.8);line-height:1;
}
/* 屬性面板 */
.inv-stats{margin-top:12px;padding-top:10px;border-top:1px solid rgba(50,80,130,.2);}
.stat-row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px;color:rgba(160,150,120,.75);}
.stat-k{color:rgba(100,140,200,.6);}
.stat-v em{color:#88BB88;font-style:normal;}
#inv-gold{padding-top:8px;font-size:13px;color:#FFD700;text-align:right;padding-right:2px;}
#inv-stats{margin-top:10px;}

/* ── Tooltip ──────────────────────────────────────────────────────── */
#item-tooltip{
  position:fixed;z-index:500;display:none;
  background:rgba(4,8,18,.97);border:1px solid rgba(70,110,170,.45);
  border-radius:5px;padding:10px 14px;pointer-events:none;
  font-size:12px;color:rgba(200,185,135,.9);line-height:1.7;max-width:220px;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  box-shadow:0 4px 20px rgba(0,0,0,.8);
}

/* ── Shop ─────────────────────────────────────────────────────────── */
#shop-panel{min-width:400px;}
.shop-tabs{display:flex;gap:0;border-bottom:1px solid rgba(50,80,130,.3);}
.shop-tab{
  padding:8px 22px;background:none;border:none;
  color:rgba(130,150,180,.55);font-size:13px;cursor:pointer;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
}
.shop-tab.active{color:#D4A017;border-color:#D4A017;}
.shop-tab:hover{color:rgba(200,175,110,.8);}
.shop-gold{padding:8px 18px;color:#FFD700;font-size:12px;border-bottom:1px solid rgba(50,80,130,.2);}
.shop-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid rgba(30,50,90,.35);
}
.shop-icon{font-size:18px;width:24px;text-align:center;}
.shop-name{flex:1;font-size:13px;color:rgba(200,185,135,.85);}
.shop-price{color:#FFD700;font-size:12px;white-space:nowrap;}
.shop-btn{
  background:rgba(100,160,80,.25);border:1px solid rgba(80,180,60,.3);
  color:#88DD66;font-size:11px;padding:4px 10px;cursor:pointer;
  border-radius:3px;transition:background .12s;
  font-family:'Segoe UI',sans-serif;
}
.shop-btn:hover:not(:disabled){background:rgba(100,180,80,.45);}
.shop-btn:disabled{opacity:.35;cursor:default;}
.shop-btn-sell{background:rgba(180,100,30,.25);border-color:rgba(200,120,40,.3);color:#DDAA44;}
.shop-btn-sell:hover{background:rgba(200,120,40,.45);}
.shop-msg{min-height:22px;font-size:12px;color:#88EE88;padding:6px 0;}

/* ── Quest ────────────────────────────────────────────────────────── */
#quest-panel{min-width:400px;}
.quest-item{padding:12px 0;border-bottom:1px solid rgba(30,50,90,.4);}
.quest-title{color:#D4A017;font-size:14px;font-weight:bold;margin-bottom:5px;}
.quest-desc{color:rgba(170,155,120,.7);font-size:12px;line-height:1.6;margin-bottom:6px;}
.quest-prog-row{font-size:12px;color:rgba(160,150,120,.8);margin-bottom:4px;}
.quest-bar-bg{height:4px;background:rgba(0,0,0,.45);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.quest-bar-fill{height:100%;background:linear-gradient(90deg,#335522,#44AA44);transition:width .4s ease;}
.quest-reward{font-size:13px;color:#CCDD88;font-weight:600;}

/* ── Craft ────────────────────────────────────────────────────────── */
#craft-panel{min-width:400px;}
.craft-item{padding:10px 0;border-bottom:1px solid rgba(30,50,90,.35);}
.craft-result{color:rgba(210,195,145,.9);font-size:13px;margin-bottom:4px;}
.craft-mats{font-size:12px;color:rgba(150,140,110,.7);margin-bottom:6px;line-height:1.7;}
.craft-btn{
  background:rgba(80,60,20,.4);border:1px solid rgba(180,140,30,.35);
  color:#D4A017;font-size:12px;padding:5px 14px;cursor:pointer;
  border-radius:3px;transition:background .12s;
  font-family:'Segoe UI',sans-serif;
}
.craft-btn:hover:not(:disabled){background:rgba(120,90,30,.55);}
.craft-btn:disabled{opacity:.35;cursor:default;color:rgba(120,110,80,.5);}
.craft-msg{min-height:22px;font-size:12px;color:#88EE88;padding:6px 0;}

/* ── Skill Tree ───────────────────────────────────────────────────── */
#skill-panel{min-width:380px;}
#skill-pts{
  padding:8px 18px;font-size:12px;color:#FFD700;
  border-bottom:1px solid rgba(50,80,130,.2);
}
.sk-tree-item{
  padding:10px 0;border-bottom:1px solid rgba(30,50,90,.35);
  transition:background .12s;
}
.sk-tree-item.unlocked .sk-tree-name{color:#88DD88;}
.sk-tree-name{color:rgba(210,195,145,.9);font-size:13px;font-weight:bold;margin-bottom:3px;}
.sk-tree-desc{font-size:12px;color:rgba(150,140,110,.7);margin-bottom:4px;}
.sk-tree-cost{font-size:11px;color:rgba(100,140,180,.6);margin-bottom:5px;}
.sk-tree-btn{
  background:rgba(40,80,150,.3);border:1px solid rgba(60,120,200,.35);
  color:#6699DD;font-size:12px;padding:5px 14px;cursor:pointer;
  border-radius:3px;transition:background .12s;
  font-family:'Segoe UI',sans-serif;
}
.sk-tree-btn:hover:not(:disabled){background:rgba(60,110,200,.5);color:#88BBFF;}
.sk-tree-btn:disabled{opacity:.35;cursor:default;}

/* ── NPC Dialog ───────────────────────────────────────────────────── */
#dialog-box{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:310;display:none;flex-direction:column;
  min-width:500px;max-width:680px;width:60vw;
  background:rgba(4,8,18,.97);border:1px solid rgba(80,120,180,.35);
  border-radius:6px;overflow:hidden;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}
#dialog-name{
  background:rgba(20,40,80,.6);padding:8px 18px;
  color:#D4A017;font-size:14px;font-weight:bold;letter-spacing:2px;
  border-bottom:1px solid rgba(60,100,160,.25);
}
#dialog-text{
  padding:14px 18px;font-size:13px;color:rgba(200,185,140,.88);
  line-height:1.8;min-height:60px;
}
#dialog-opts{
  display:flex;flex-wrap:wrap;gap:8px;padding:10px 18px 14px;
  border-top:1px solid rgba(40,70,120,.25);
}
.dlg-btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(80,120,180,.3);
  color:rgba(170,160,130,.8);font-size:12px;padding:7px 16px;
  cursor:pointer;border-radius:3px;transition:all .15s;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}
.dlg-btn:hover{background:rgba(80,120,200,.2);border-color:#4488BB;color:#AACCEE;}

/* ── 城鎮提示 ─────────────────────────────────────────────────────── */
#town-hint{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  z-index:55;display:none;pointer-events:none;
  background:rgba(0,0,0,.72);border:1px solid rgba(80,200,80,.3);
  border-radius:4px;padding:6px 18px;
  color:rgba(140,230,140,.88);font-size:12px;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}

/* ── 區域 HUD ──────────────────────────────────────────────────────── */
#area-hud{
  position:fixed;top:10px;right:14px;z-index:50;
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  pointer-events:none;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}
#area-name{font-size:11px;font-weight:bold;text-shadow:0 1px 4px #000;color:#88FF88;}
#area-level{font-size:10px;color:rgba(160,150,120,.6);}
#area-danger{font-size:10px;color:#FFAA22;}
#hud-title{
  font-size:12px;color:#FFD700;
  text-shadow:0 0 8px #FFD70088;margin-top:2px;
}

/* ── 區域切換通知（右上角，不遮擋戰鬥視野） ─────────────────────── */
#area-notif{
  position:fixed;top:120px;right:14px;left:auto;
  transform:none;
  z-index:56;display:none;flex-direction:column;align-items:flex-end;
  pointer-events:none;gap:2px;
  background:rgba(0,0,0,.70);border:1px solid rgba(80,120,180,.25);
  border-radius:5px;padding:7px 14px;min-width:0;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  animation:areaSlideIn .25s ease-out;
}
@keyframes areaSlideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* ── 世界事件橫幅 ─────────────────────────────────────────────────── */
#event-bar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  z-index:58;display:none;align-items:center;gap:14px;
  background:rgba(0,0,0,.82);border-bottom:1px solid rgba(200,100,20,.3);
  padding:4px 24px;pointer-events:none;
  font-size:12px;font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}

/* ── 成就解鎖通知 ─────────────────────────────────────────────────── */
#ach-notif{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  z-index:57;display:none;pointer-events:none;
  background:rgba(0,0,0,.88);border:1px solid rgba(255,215,0,.4);
  border-radius:5px;padding:10px 26px;
  color:#FFD700;font-size:13px;font-weight:bold;letter-spacing:1px;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  text-shadow:0 0 14px #FFD70055;
}

/* ── 倉庫面板 ─────────────────────────────────────────────────────── */
#warehouse-panel{min-width:560px;}
#warehouse-grid{
  display:grid;grid-template-columns:repeat(10,1fr);gap:3px;
  margin-top:6px;
}

/* ── 圖鑑面板 ─────────────────────────────────────────────────────── */
#bestiary-panel{min-width:420px;}
.bst-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;border-bottom:1px solid rgba(30,50,90,.35);
  font-size:12px;font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}
.bst-name{flex:1;color:rgba(200,185,140,.85);}
.bst-bio{color:rgba(100,140,180,.6);width:60px;text-align:center;}
.bst-kills{color:rgba(120,170,120,.8);white-space:nowrap;}

/* ── 成就面板 ─────────────────────────────────────────────────────── */
#ach-panel{min-width:420px;}
.ach-cat{
  color:#4488BB;font-size:11px;letter-spacing:2px;
  padding:10px 0 5px;border-bottom:1px solid rgba(30,50,90,.35);
  margin-bottom:3px;
}
.ach-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:7px 0;border-bottom:1px solid rgba(20,35,65,.4);
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
}
.ach-item.ach-done .ach-name{color:rgba(210,195,145,.9);}
.ach-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.ach-name{font-size:13px;color:rgba(80,80,80,.6);font-weight:bold;}
.ach-desc{font-size:11px;color:rgba(120,110,90,.5);line-height:1.5;}
.ach-title-tag{font-size:11px;color:#D4A017;margin-top:2px;}
.ach-check{color:#44DD44;font-size:14px;margin-left:auto;align-self:center;}

/* ── 聲望面板 ─────────────────────────────────────────────────────── */
#rep-panel{min-width:400px;}
.rep-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(30,50,90,.35);
}
.rep-icon{font-size:20px;width:26px;text-align:center;flex-shrink:0;}
.rep-info{flex:1;}
.rep-name{font-size:13px;font-weight:bold;margin-bottom:2px;}
.rep-tier{font-size:12px;margin-bottom:4px;}
.rep-bar{height:4px;background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden;}
.rep-fill{height:100%;border-radius:2px;transition:width .4s ease;}

/* ── Screen overlay ───────────────────────────────────────────────── */
#screens{
  position:fixed;inset:0;z-index:200;
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  user-select:none;transition:opacity .85s ease;
}
#screens.fade-out{opacity:0;pointer-events:none;}

.g-screen{
  position:absolute;inset:0;
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
.g-screen.active{display:flex;}

/* ── Shared Buttons ───────────────────────────────────────────────── */
.g-btn{
  background:linear-gradient(155deg,#7A5810 0%,#D4A017 48%,#7A5810 100%);
  color:#0a0510;border:none;padding:13px 48px;
  font-size:15px;font-weight:bold;letter-spacing:3px;cursor:pointer;
  border-radius:3px;box-shadow:0 0 20px #D4A01755;
  transition:box-shadow .18s,transform .12s;margin:7px;
  font-family:inherit;
}
.g-btn:hover{box-shadow:0 0 38px #D4A017BB;transform:scale(1.04);}
.g-btn:active{transform:scale(.97);}
.g-btn:disabled{opacity:.28;cursor:default;transform:none;box-shadow:none;}
.g-btn-sm{
  background:transparent;border:1px solid #2e3a55;color:#6688AA;
  padding:8px 20px;font-size:13px;cursor:pointer;border-radius:3px;
  transition:border-color .18s,color .18s;font-family:inherit;
}
.g-btn-sm:hover{border-color:#D4A017;color:#D4A017;}

/* ══════════════════════════════════════════════════════════════════
   TITLE SCREEN
   ══════════════════════════════════════════════════════════════════ */
#scr-title{
  background:radial-gradient(ellipse at 50% 38%,#0e1b2e 0%,#020408 68%);
}
.ttl-wrap{text-align:center;}
.ttl-main{
  font-size:64px;color:#D4A017;margin:0;letter-spacing:10px;
  animation:ttlGlow 3.5s ease-in-out infinite alternate;
}
@keyframes ttlGlow{
  from{text-shadow:0 0 28px #D4A01766,0 0 60px #D4A01722;}
  to  {text-shadow:0 0 58px #D4A017CC,0 0 110px #D4A01755;}
}
.ttl-sub{color:#4d5f88;letter-spacing:7px;font-size:12px;margin:10px 0 52px;}
.ttl-ver{position:fixed;bottom:13px;right:17px;color:#1e2030;font-size:11px;}
.ttl-hint{
  color:#2e3f55;font-size:12px;margin-top:30px;letter-spacing:1px;
  animation:blink 2.2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.3;}50%{opacity:.9;}}

/* ══════════════════════════════════════════════════════════════════
   CHARACTER CREATION SCREEN
   ══════════════════════════════════════════════════════════════════ */
#scr-create{
  background:rgba(2,4,10,.97);
  padding:20px 0 28px;overflow-y:auto;justify-content:flex-start;
}
.cr-title{
  color:#D4A017;font-size:20px;letter-spacing:6px;
  margin:0 0 22px;text-align:center;width:100%;
  text-shadow:0 0 18px #D4A01766;
}

/* Layout */
.cr-layout{
  display:flex;gap:30px;max-width:920px;width:100%;padding:0 22px;
}

/* ── Class list (left) ── */
.cls-list{display:flex;flex-direction:column;gap:9px;width:188px;flex-shrink:0;}
.cls-card{
  background:rgba(255,255,255,.03);border:1px solid #1c2638;
  border-radius:5px;padding:11px 13px;cursor:pointer;
  transition:background .15s,border-color .15s;
  display:flex;align-items:center;gap:12px;
}
.cls-card:hover{background:rgba(212,160,23,.09);border-color:#5c4410;}
.cls-card.sel{background:rgba(212,160,23,.17);border-color:#C49A14;
  box-shadow:0 0 12px #D4A01733;}
.cls-icon{font-size:20px;width:26px;text-align:center;flex-shrink:0;line-height:1;}
.cls-nm{color:#EDD88A;font-size:14px;font-weight:bold;line-height:1.2;}
.cls-role{color:#4d6280;font-size:11px;margin-top:3px;}

/* ── Right panel ── */
.cr-right{flex:1;display:flex;flex-direction:column;align-items:center;gap:15px;min-width:0;}
#cv-char{
  image-rendering:pixelated;image-rendering:crisp-edges;
  width:110px;height:150px;display:block;
  background:rgba(255,255,255,.02);border:1px solid #1a2438;border-radius:6px;
}
.cls-detail-name{
  color:#D4A017;font-size:17px;font-weight:bold;text-align:center;margin-bottom:7px;
}
.cls-detail-desc{
  color:#8AABBF;font-size:13px;line-height:1.80;text-align:center;max-width:360px;
}

/* Stat bars */
.stats-row{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.st{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:46px;}
.st-lbl{color:#3d5266;font-size:10px;letter-spacing:1px;}
.st-bar{width:46px;height:5px;background:#0c1020;border-radius:3px;overflow:hidden;}
.st-fill{height:100%;border-radius:3px;transition:width .28s ease;}
.st-atk{background:linear-gradient(90deg,#CC2200,#FF4422);}
.st-def{background:linear-gradient(90deg,#1133BB,#2255EE);}
.st-spd{background:linear-gradient(90deg,#118833,#22BB44);}
.st-mag{background:linear-gradient(90deg,#6611BB,#9933EE);}

/* Divider */
.cr-div{width:100%;max-width:340px;height:1px;
  background:linear-gradient(90deg,transparent,#1e2e48,transparent);margin:2px 0;}

/* Name input */
.nm-area{display:flex;flex-direction:column;gap:7px;width:100%;max-width:300px;}
.nm-lbl{color:#445566;font-size:11px;letter-spacing:2px;}
#inp-name{
  background:rgba(255,255,255,.05);border:1px solid #243050;
  color:#EDD88A;padding:10px 14px;font-size:16px;letter-spacing:2px;
  border-radius:3px;outline:none;width:100%;font-family:inherit;
}
#inp-name:focus{border-color:#C49A14;box-shadow:0 0 12px #D4A01728;}
#inp-name::placeholder{color:#263040;letter-spacing:1px;}

/* Back button */
.back-pos{position:fixed;top:16px;left:16px;}

/* ── 新手教學面板 ── */
#tutorial-box{
  position:fixed;bottom:90px;right:18px;z-index:320;width:230px;
  background:rgba(8,16,32,0.93);
  border:1px solid rgba(80,130,220,0.35);border-radius:8px;
  padding:13px 15px;color:rgba(220,200,155,0.92);
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  display:none;pointer-events:all;box-shadow:0 2px 18px rgba(0,0,0,.55);
}
#tut-header{display:flex;align-items:center;margin-bottom:10px;}
#tut-step-num{font-size:10px;color:rgba(120,160,240,.7);letter-spacing:1px;}
#tut-skip{margin-left:auto;background:none;border:1px solid rgba(180,140,80,.3);
  color:rgba(180,140,80,.6);font-size:10px;padding:2px 8px;cursor:pointer;
  border-radius:3px;font-family:inherit;}
#tut-skip:hover{color:#FFD700;border-color:#FFD700;}
#tut-icon-el{font-size:26px;text-align:center;margin-bottom:6px;}
#tut-title-el{font-weight:bold;font-size:13px;color:#FFD700;margin-bottom:6px;text-align:center;}
#tut-msg-el{font-size:11px;line-height:1.65;color:rgba(210,195,155,.85);
  margin-bottom:12px;text-align:center;}
#tut-msg-el b{color:#88DDFF;}
#tut-next{width:100%;background:rgba(40,80,160,.55);border:1px solid rgba(80,130,220,.4);
  color:rgba(200,220,255,.9);font-size:11px;padding:6px 0;cursor:pointer;
  border-radius:4px;font-family:inherit;letter-spacing:1px;}
#tut-next:hover{background:rgba(60,110,210,.7);color:#fff;}

/* ── 任務委託面板 ── */
#quest-offer-panel .ui-panel{min-width:420px;max-width:480px;}
